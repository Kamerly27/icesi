<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Plataforma</title>
</head>
<body>

<div class="login-container">

    <!-- IMAGEN -->
    <div class="left">
        <img src="{{ url_for('static', filename='fondo.jpg') }}">
    </div>

    <!-- FORMULARIO -->
    <div class="right">

        <div class="form-box">
            <h2>Inicia sesión</h2>

            <form method="POST" action="/ingresar">
                <input type="text" name="usuario" placeholder="Documento">
                <input type="password" name="password" placeholder="Contraseña">
                <button>Ingresar</button>
            </form>

            <!-- 🔵 LINK -->
            <p style="color: blue; margin-top:10px; cursor:pointer;">
                ¿Olvidaste tu contraseña?
            </p>
        </div>

        <!-- 🔥 PIE DE PÁGINA -->
        <div style="position:absolute; bottom:10px; text-align:center; font-size:12px; color:#555;">
            Universidad Icesi, Calle 18 No. 122-135 <br>
            Cali-Colombia | Teléfono: 555 2334 | Fax: 555 1441 <br>
            Copyright © 2025 www.icesi.edu.co
        </div>

    </div>

</div>

</body>
</html>
